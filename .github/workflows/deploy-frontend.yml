name: Build and deploy frontend to Azure Web App - zjgilliam-flask-frontend

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Create and start virtual environment and install dependencies
        run: |
          python -m venv antenv
          source antenv/bin/activate
          python -m pip install --upgrade pip
          pip install -r frontend/requirements.txt

      - name: Validate app import
        run: |
          source antenv/bin/activate
          cd frontend
          python -c "from app import app; print(app.url_map)"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: python-app-frontend
          path: |
            frontend/
            !frontend/antenv/

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app-frontend

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'zjgilliam-flask-frontend'
          slot-name: 'Production'
          # Add the frontend publish profile secret from Azure portal:
          # Settings → Publish Profile → Download → add as AZUREAPPSERVICE_PUBLISHPROFILE_FRONTEND
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_FRONTEND }}
